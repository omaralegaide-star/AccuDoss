# Codemagic CI/CD configuration for Kotlin Multiplatform (KMP) iOS Application
# For support/questions, visit: https://docs.codemagic.io/

workflows:
  ios-kmp-workflow:
    name: Build AccuDose KMP iOS App
    max_build_duration: 60
    instance_type: mac_mini_m1 # Compile on fast Apple Silicon M1 machines
    
    environment:
      groups:
        - signing_credentials # Define this group in Codemagic UI if using App Store certificates
      vars:
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
      java: 17
      xcode: latest

    triggering:
      events:
        - push
        - pull_request
      branch_filter:
        target:
          - main
          - master

    scripts:
      - name: Make Gradle wrapper executable
        script: |
          chmod +x gradlew

      - name: Precompile Kotlin Native Framework for iOS Arm64
        script: |
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Build Unsigned Xcode Archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/iosApp/build/iosApp.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package App as Sideloadable IPA (Unsigned)
        script: |
          cd iosApp/build
          mkdir -p Payload
          cp -r iosApp.xcarchive/Products/Applications/iosApp.app Payload/
          zip -r AccuDose-Unsigned.ipa Payload
          echo "Unsigned IPA packaged successfully at iosApp/build/AccuDose-Unsigned.ipa"

    artifacts:
      - iosApp/build/*.ipa
      - composeApp/build/cocoapods/framework/*.framework
